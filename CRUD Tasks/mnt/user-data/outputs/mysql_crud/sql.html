<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MySQL CRUD</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --border: #252530;
      --accent: #f5a623;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --danger: #ff4466;
      --edit: #4488ff;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 720px; margin: 0 auto; position: relative; z-index: 1; }

    header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2.5rem; animation: slideDown 0.5s ease both; }

    .db-badge {
      background: var(--accent);
      color: #000;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      padding: 4px 10px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; }
    h1 span { color: var(--accent); }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .form-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; display: block; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 0.75rem; }

    input[type="text"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.65rem 1rem;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--accent); }

    .btn-row { display: flex; gap: 0.5rem; }

    button {
      font-family: 'Syne', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-cancel { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-cancel:hover { color: var(--text); border-color: var(--muted); }

    .list-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.75rem; animation: fadeUp 0.5s 0.2s ease both; }
    .list-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .item-count { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--accent); background: rgba(245,166,35,0.08); padding: 2px 10px; border-radius: 20px; }

    #itemList { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      animation: fadeUp 0.3s ease both;
      transition: border-color 0.2s;
    }

    .item-card:hover { border-color: #333344; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 700; font-size: 0.95rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-desc { font-family: 'DM Mono', monospace; font-size: 0.78rem; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }

    .btn-edit { background: rgba(68,136,255,0.12); color: var(--edit); border: 1px solid rgba(68,136,255,0.25); padding: 0.4rem 0.85rem; font-size: 0.75rem; }
    .btn-edit:hover { background: rgba(68,136,255,0.22); }
    .btn-delete { background: rgba(255,68,102,0.1); color: var(--danger); border: 1px solid rgba(255,68,102,0.2); padding: 0.4rem 0.85rem; font-size: 0.75rem; }
    .btn-delete:hover { background: rgba(255,68,102,0.2); }

    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.85rem; border: 1px dashed var(--border); border-radius: var(--radius); }
    .empty-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; opacity: 0.4; }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <span class="db-badge">MySQL</span>
        <h1 style="margin-top:4px"><span>CRUD</span> Manager</h1>
      </div>
    </header>

    <div class="form-card">
      <span class="form-label" id="formLabel">Add New Item</span>
      <input type="hidden" id="itemId" />
      <div class="form-row">
        <input type="text" id="name" placeholder="Item name…" required />
        <input type="text" id="description" placeholder="Description…" />
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="submitBtn" onclick="submitForm()">+ Add Item</button>
        <button class="btn-cancel" id="cancelBtn" style="display:none" onclick="resetForm()">Cancel</button>
      </div>
    </div>

    <div class="list-header">
      <span class="list-title">Items</span>
      <span class="item-count" id="itemCount">0 items</span>
    </div>

    <ul id="itemList"></ul>
  </div>

  <script>
    const API_URL = 'http://localhost:3001/api/items';

    async function fetchItems() {
      try {
        const res = await fetch(API_URL);
        const items = await res.json();
        renderItems(items);
      } catch (e) {
        document.getElementById('itemList').innerHTML = `<div class="empty-state"><span class="empty-icon">⚠</span>Could not connect to server</div>`;
      }
    }

    function renderItems(items) {
      const list = document.getElementById('itemList');
      const countEl = document.getElementById('itemCount');
      countEl.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
      if (!items.length) {
        list.innerHTML = `<div class="empty-state"><span class="empty-icon">○</span>No items yet. Add one above!</div>`;
        return;
      }
      list.innerHTML = '';
      items.forEach((item, i) => {
        const li = document.createElement('li');
        li.className = 'item-card';
        li.style.animationDelay = `${i * 0.04}s`;
        li.innerHTML = `
          <div class="item-info">
            <div class="item-name">${esc(item.name)}</div>
            ${item.description ? `<div class="item-desc">${esc(item.description)}</div>` : ''}
          </div>
          <div class="item-actions">
            <button class="btn-edit" onclick="editItem('${item.id}','${esc(item.name)}','${esc(item.description||'')}')">Edit</button>
            <button class="btn-delete" onclick="deleteItem('${item.id}')">Delete</button>
          </div>`;
        list.appendChild(li);
      });
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }

    async function submitForm() {
      const id = document.getElementById('itemId').value;
      const name = document.getElementById('name').value.trim();
      const description = document.getElementById('description').value.trim();
      if (!name) return;
      const method = id ? 'PUT' : 'POST';
      const url = id ? `${API_URL}/${id}` : API_URL;
      await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify({ name, description }) });
      resetForm();
      fetchItems();
    }

    function editItem(id, name, description) {
      document.getElementById('itemId').value = id;
      document.getElementById('name').value = name;
      document.getElementById('description').value = description;
      document.getElementById('submitBtn').textContent = '✓ Update Item';
      document.getElementById('cancelBtn').style.display = 'inline-block';
      document.getElementById('formLabel').textContent = 'Edit Item';
    }

    async function deleteItem(id) {
      if (confirm('Delete this item?')) {
        await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        fetchItems();
      }
    }

    function resetForm() {
      document.getElementById('itemId').value = '';
      document.getElementById('name').value = '';
      document.getElementById('description').value = '';
      document.getElementById('submitBtn').textContent = '+ Add Item';
      document.getElementById('cancelBtn').style.display = 'none';
      document.getElementById('formLabel').textContent = 'Add New Item';
    }

    fetchItems();
  </script>
</body>
</html>
